<!DOCTYPE html>

        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <nav class="navbar">
            <h2 class="logo">📲 Phone Finder</h2>

            <div class="nav-links">
                <a href="index.html">Home</a>

    <button onclick="filterPhones('Google')">Google</button>
    <button onclick="filterPhones('OnePlus')">OnePlus</button>
    <button onclick="filterPhones('Vivo')">Vivo</button>
    <button onclick="filterPhones('Tecno')">Tecno</button>
    <button onclick="filterPhones('Xiaomi')">Xiaomi</button>
    <button onclick="filterPhones('Nothing')">Nothing</button>
    <button onclick="filterPhones('Honor')">Honor</button>
    <button onclick="filterPhones('Motorola')">Motorola</button>

<!-- Phone cards will be inserted here -->
<section id="phoneContainer"></section>
